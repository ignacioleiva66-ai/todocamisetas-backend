cat > docker-compose.yml << 'EOF'
version: '3.8'

services:

  app:
    image: php:8.2-apache
    container_name: todocamisetas_app
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
    environment:
      - APACHE_DOCUMENT_ROOT=/var/www/html/public
    command: >
      sh -c "a2enmod rewrite &&
             sed -i 's!/var/www/html!/var/www/html/public!g' /etc/apache2/sites-available/000-default.conf &&
             docker-php-ext-install pdo pdo_mysql &&
             apache2-foreground"
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: todocamisetas_db
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: todocamisetas
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret
    volumes:
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 10s
      retries: 5

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: todocamisetas_pma
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: root
    depends_on:
      - db

  swagger-ui:
    image: swaggerapi/swagger-ui
    container_name: todocamisetas_swagger
    ports:
      - "8081:8080"
    volumes:
      - ./docs/swagger.yaml:/usr/share/nginx/html/swagger.yaml
    environment:
      SPEC_URL: swagger.yaml

volumes:
  db_data:
EOF
